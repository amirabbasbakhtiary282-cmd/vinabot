name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf automake build-essential \
            git gettext libffi-dev libjpeg-dev \
            libltdl-dev libncurses5 libncursesw5 \
            libssl-dev libtool pkg-config \
            python3-dev zlib1g-dev zip unzip wget

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade Cython==0.29.36 wheel setuptools
          pip install buildozer

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "BUILD_RESULT=$?" >> $GITHUB_ENV

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vinabot-apk
          path: |
            bin/*.apk
            build.log
          retention-days: 30
          if-no-files-found: warn
